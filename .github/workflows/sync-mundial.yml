name: Sync Mundial 2026 Results

on:
  schedule:
    # Corre cada hora (00 minutos de cada hora UTC)
    # Durante la fase de grupos del Mundial 2026 (11 jun - 25 jun)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Permite correr manualmente desde la pestaña Actions de GitHub
    inputs:
      dry_run:
        description: 'Modo prueba (no escribe a Firebase)'
        required: false
        default: 'false'

jobs:
  sync:
    name: Sync openfootball → Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install --no-audit --no-fund

      - name: Run sync script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd .github/scripts
          node sync-mundial.js

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Sync falló. Revisa los logs para detalles."
